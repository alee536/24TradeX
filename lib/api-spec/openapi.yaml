openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: 24TradeX API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication operations
  - name: dashboard
    description: Dashboard summary
  - name: purchases
    description: Token purchase operations
  - name: withdrawals
    description: Withdrawal operations
  - name: sponsor
    description: Sponsor system operations
  - name: transactions
    description: Transaction history
  - name: notifications
    description: Notification operations
  - name: profile
    description: User profile
  - name: admin
    description: Admin operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/register:
    post:
      operationId: register
      tags: [auth]
      summary: Register new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: Validation error

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginInput"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Unauthorized

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Logout
      responses:
        "200":
          description: OK

  /dashboard/summary:
    get:
      operationId: getDashboardSummary
      tags: [dashboard]
      summary: Get dashboard summary stats
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"

  /purchases:
    get:
      operationId: listPurchases
      tags: [purchases]
      summary: List user purchases
      parameters:
        - in: query
          name: page
          schema:
            type: integer
        - in: query
          name: status
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PurchaseList"
    post:
      operationId: createPurchase
      tags: [purchases]
      summary: Submit a new token purchase request
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PurchaseInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Purchase"

  /purchases/{id}:
    get:
      operationId: getPurchase
      tags: [purchases]
      summary: Get purchase details
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Purchase"

  /withdrawals:
    get:
      operationId: listWithdrawals
      tags: [withdrawals]
      summary: List user withdrawals
      parameters:
        - in: query
          name: page
          schema:
            type: integer
        - in: query
          name: status
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WithdrawalList"
    post:
      operationId: createWithdrawal
      tags: [withdrawals]
      summary: Submit a withdrawal request
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WithdrawalInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Withdrawal"

  /withdrawals/unlocked:
    get:
      operationId: getUnlockedAmount
      tags: [withdrawals]
      summary: Get currently unlocked token amounts per purchase
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UnlockedAmounts"

  /sponsor/stats:
    get:
      operationId: getSponsorStats
      tags: [sponsor]
      summary: Get sponsor statistics
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SponsorStats"

  /sponsor/users:
    get:
      operationId: listSponsoredUsers
      tags: [sponsor]
      summary: List sponsored users
      parameters:
        - in: query
          name: page
          schema:
            type: integer
        - in: query
          name: search
          schema:
            type: string
        - in: query
          name: status
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SponsoredUserList"

  /transactions:
    get:
      operationId: listTransactions
      tags: [transactions]
      summary: List all transactions (purchases + withdrawals + sponsor activity)
      parameters:
        - in: query
          name: page
          schema:
            type: integer
        - in: query
          name: type
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TransactionList"

  /notifications:
    get:
      operationId: listNotifications
      tags: [notifications]
      summary: List user notifications
      parameters:
        - in: query
          name: unread_only
          schema:
            type: boolean
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotificationList"

  /notifications/{id}/read:
    post:
      operationId: markNotificationRead
      tags: [notifications]
      summary: Mark a notification as read
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: OK

  /notifications/read-all:
    post:
      operationId: markAllNotificationsRead
      tags: [notifications]
      summary: Mark all notifications as read
      responses:
        "200":
          description: OK

  /profile:
    get:
      operationId: getProfile
      tags: [profile]
      summary: Get user profile
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"
    patch:
      operationId: updateProfile
      tags: [profile]
      summary: Update user profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProfileUpdate"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"

  /admin/users:
    get:
      operationId: adminListUsers
      tags: [admin]
      summary: Admin - list all users
      parameters:
        - in: query
          name: page
          schema:
            type: integer
        - in: query
          name: search
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminUserList"

  /admin/users/{id}:
    patch:
      operationId: adminUpdateUser
      tags: [admin]
      summary: Admin - activate/deactivate/ban user
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminUserUpdate"
      responses:
        "200":
          description: OK

  /admin/purchases:
    get:
      operationId: adminListPurchases
      tags: [admin]
      summary: Admin - list all purchases
      parameters:
        - in: query
          name: page
          schema:
            type: integer
        - in: query
          name: status
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PurchaseList"

  /admin/purchases/{id}/approve:
    post:
      operationId: adminApprovePurchase
      tags: [admin]
      summary: Admin - approve a purchase
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: OK

  /admin/purchases/{id}/reject:
    post:
      operationId: adminRejectPurchase
      tags: [admin]
      summary: Admin - reject a purchase
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RejectInput"
      responses:
        "200":
          description: OK

  /admin/withdrawals:
    get:
      operationId: adminListWithdrawals
      tags: [admin]
      summary: Admin - list all withdrawals
      parameters:
        - in: query
          name: page
          schema:
            type: integer
        - in: query
          name: status
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WithdrawalList"

  /admin/withdrawals/{id}/approve:
    post:
      operationId: adminApproveWithdrawal
      tags: [admin]
      summary: Admin - approve withdrawal with manual tx hash
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ApproveWithdrawalInput"
      responses:
        "200":
          description: OK

  /admin/withdrawals/{id}/reject:
    post:
      operationId: adminRejectWithdrawal
      tags: [admin]
      summary: Admin - reject withdrawal
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RejectInput"
      responses:
        "200":
          description: OK

  /admin/settings:
    get:
      operationId: adminGetSettings
      tags: [admin]
      summary: Admin - get system settings
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SystemSettings"
    patch:
      operationId: adminUpdateSettings
      tags: [admin]
      summary: Admin - update system settings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SystemSettingsUpdate"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SystemSettings"

  /admin/sponsor:
    get:
      operationId: adminListSponsorRelations
      tags: [admin]
      summary: Admin - view all sponsor relationships
      parameters:
        - in: query
          name: page
          schema:
            type: integer
        - in: query
          name: search
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminSponsorList"

  /admin/stats:
    get:
      operationId: adminGetStats
      tags: [admin]
      summary: Admin - get platform-wide statistics
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminStats"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    RegisterInput:
      type: object
      required: [username, full_name, email, password]
      properties:
        username:
          type: string
        full_name:
          type: string
        email:
          type: string
          format: email
        password:
          type: string
        sponsor_code:
          type: ["string", "null"]

    LoginInput:
      type: object
      required: [username, password]
      properties:
        username:
          type: string
        password:
          type: string

    AuthResponse:
      type: object
      required: [token, user]
      properties:
        token:
          type: string
        user:
          $ref: "#/components/schemas/UserProfile"

    UserProfile:
      type: object
      required: [id, username, full_name, email, sponsor_code, sponsor_link, is_admin, is_active, date_joined]
      properties:
        id:
          type: integer
        username:
          type: string
        full_name:
          type: string
        email:
          type: string
        sponsor_code:
          type: string
        sponsor_link:
          type: string
        is_admin:
          type: boolean
        is_active:
          type: boolean
        date_joined:
          type: string
          format: date-time
        wallet_address:
          type: ["string", "null"]

    ProfileUpdate:
      type: object
      properties:
        full_name:
          type: string
        wallet_address:
          type: ["string", "null"]

    DashboardSummary:
      type: object
      required: [total_purchased, total_sold, available_withdrawal, pending_withdrawal, sponsor_earnings, unread_notifications]
      properties:
        total_purchased:
          type: number
        total_sold:
          type: number
        available_withdrawal:
          type: number
        pending_withdrawal:
          type: number
        sponsor_earnings:
          type: number
        unread_notifications:
          type: integer

    Purchase:
      type: object
      required: [id, transaction_id, amount, status, created_at]
      properties:
        id:
          type: integer
        transaction_id:
          type: string
        amount:
          type: number
        txid:
          type: ["string", "null"]
        wallet_address:
          type: ["string", "null"]
        status:
          type: string
          enum: [pending, approved, rejected]
        rejection_reason:
          type: ["string", "null"]
        created_at:
          type: string
          format: date-time
        approved_at:
          type: ["string", "null"]
        unlock_stage:
          type: integer
        unlocked_amount:
          type: number

    PurchaseInput:
      type: object
      required: [amount, txid, wallet_address]
      properties:
        amount:
          type: number
        txid:
          type: string
        wallet_address:
          type: string
        screenshot_url:
          type: ["string", "null"]

    PurchaseList:
      type: object
      required: [results, count]
      properties:
        results:
          type: array
          items:
            $ref: "#/components/schemas/Purchase"
        count:
          type: integer
        next:
          type: ["string", "null"]
        previous:
          type: ["string", "null"]

    Withdrawal:
      type: object
      required: [id, amount, wallet_address, status, created_at]
      properties:
        id:
          type: integer
        amount:
          type: number
        wallet_address:
          type: string
        status:
          type: string
          enum: [pending, approved, rejected]
        manual_tx_hash:
          type: ["string", "null"]
        rejection_reason:
          type: ["string", "null"]
        created_at:
          type: string
          format: date-time

    WithdrawalInput:
      type: object
      required: [amount, wallet_address]
      properties:
        amount:
          type: number
        wallet_address:
          type: string

    WithdrawalList:
      type: object
      required: [results, count]
      properties:
        results:
          type: array
          items:
            $ref: "#/components/schemas/Withdrawal"
        count:
          type: integer
        next:
          type: ["string", "null"]
        previous:
          type: ["string", "null"]

    UnlockedAmounts:
      type: object
      required: [total_unlocked, total_withdrawn, available]
      properties:
        total_unlocked:
          type: number
        total_withdrawn:
          type: number
        available:
          type: number
        breakdown:
          type: array
          items:
            $ref: "#/components/schemas/UnlockBreakdownItem"

    UnlockBreakdownItem:
      type: object
      required: [purchase_id, transaction_id, amount, unlocked, stage, next_unlock_at]
      properties:
        purchase_id:
          type: integer
        transaction_id:
          type: string
        amount:
          type: number
        unlocked:
          type: number
        stage:
          type: integer
        next_unlock_at:
          type: ["string", "null"]

    SponsorStats:
      type: object
      required: [sponsor_code, sponsor_link, total_sponsored, active_sponsored, sponsor_earnings]
      properties:
        sponsor_code:
          type: string
        sponsor_link:
          type: string
        total_sponsored:
          type: integer
        active_sponsored:
          type: integer
        sponsor_earnings:
          type: number
        sponsored_purchases:
          type: number
        sponsored_withdrawals:
          type: number

    SponsoredUser:
      type: object
      required: [id, username, full_name, status, date_joined]
      properties:
        id:
          type: integer
        username:
          type: string
        full_name:
          type: string
        purchase_amount:
          type: number
        sale_amount:
          type: number
        withdrawal_amount:
          type: number
        status:
          type: string
        date_joined:
          type: string
          format: date-time

    SponsoredUserList:
      type: object
      required: [results, count]
      properties:
        results:
          type: array
          items:
            $ref: "#/components/schemas/SponsoredUser"
        count:
          type: integer

    Transaction:
      type: object
      required: [id, type, amount, status, created_at]
      properties:
        id:
          type: integer
        type:
          type: string
          enum: [purchase, withdrawal, sponsor_earning]
        amount:
          type: number
        status:
          type: string
        description:
          type: ["string", "null"]
        created_at:
          type: string
          format: date-time

    TransactionList:
      type: object
      required: [results, count]
      properties:
        results:
          type: array
          items:
            $ref: "#/components/schemas/Transaction"
        count:
          type: integer

    Notification:
      type: object
      required: [id, message, type, is_read, created_at]
      properties:
        id:
          type: integer
        message:
          type: string
        type:
          type: string
        is_read:
          type: boolean
        created_at:
          type: string
          format: date-time

    NotificationList:
      type: object
      required: [results, count, unread_count]
      properties:
        results:
          type: array
          items:
            $ref: "#/components/schemas/Notification"
        count:
          type: integer
        unread_count:
          type: integer

    AdminUserList:
      type: object
      required: [results, count]
      properties:
        results:
          type: array
          items:
            $ref: "#/components/schemas/AdminUser"
        count:
          type: integer

    AdminUser:
      type: object
      required: [id, username, full_name, email, is_active, is_banned, date_joined]
      properties:
        id:
          type: integer
        username:
          type: string
        full_name:
          type: string
        email:
          type: string
        is_active:
          type: boolean
        is_banned:
          type: boolean
        sponsor_code:
          type: string
        total_purchased:
          type: number
        total_withdrawn:
          type: number
        date_joined:
          type: string
          format: date-time

    AdminUserUpdate:
      type: object
      properties:
        is_active:
          type: boolean
        is_banned:
          type: boolean

    RejectInput:
      type: object
      required: [reason]
      properties:
        reason:
          type: string

    ApproveWithdrawalInput:
      type: object
      required: [manual_tx_hash]
      properties:
        manual_tx_hash:
          type: string

    SystemSettings:
      type: object
      required: [stage1_hours, stage1_percent, stage2_hours, stage2_percent, stage3_hours, stage3_percent, min_purchase, max_purchase, usdt_wallet_address, sponsor_percentage]
      properties:
        stage1_hours:
          type: integer
        stage1_percent:
          type: number
        stage2_hours:
          type: integer
        stage2_percent:
          type: number
        stage3_hours:
          type: integer
        stage3_percent:
          type: number
        min_purchase:
          type: number
        max_purchase:
          type: number
        usdt_wallet_address:
          type: string
        sponsor_percentage:
          type: number

    SystemSettingsUpdate:
      type: object
      properties:
        stage1_hours:
          type: integer
        stage1_percent:
          type: number
        stage2_hours:
          type: integer
        stage2_percent:
          type: number
        stage3_hours:
          type: integer
        stage3_percent:
          type: number
        min_purchase:
          type: number
        max_purchase:
          type: number
        usdt_wallet_address:
          type: string
        sponsor_percentage:
          type: number

    AdminSponsorList:
      type: object
      required: [results, count]
      properties:
        results:
          type: array
          items:
            $ref: "#/components/schemas/AdminSponsorRelation"
        count:
          type: integer

    AdminSponsorRelation:
      type: object
      required: [sponsor_username, sponsored_username, sponsored_full_name, date_joined]
      properties:
        sponsor_username:
          type: string
        sponsored_username:
          type: string
        sponsored_full_name:
          type: string
        purchase_amount:
          type: number
        withdrawal_amount:
          type: number
        earnings:
          type: number
        date_joined:
          type: string
          format: date-time

    AdminStats:
      type: object
      required: [total_users, total_purchases, total_withdrawals, total_volume, pending_purchases, pending_withdrawals]
      properties:
        total_users:
          type: integer
        total_purchases:
          type: number
        total_withdrawals:
          type: number
        total_volume:
          type: number
        pending_purchases:
          type: integer
        pending_withdrawals:
          type: integer
