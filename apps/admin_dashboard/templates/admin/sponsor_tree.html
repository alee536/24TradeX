{% extends "admin/base.html" %}

{% block title %}Sponsor Tree - 24TradeX Admin{% endblock %}

{% block content %}
<div class="header">
    <h1><i class="bi bi-diagram-3"></i> Sponsor Tree</h1>
</div>

<div class="stat-card">
    <div id="tree-container" style="overflow-x: auto; padding: 20px;">
        {% for root in tree_list %}
            {% include "admin/partials/tree_node.html" with node=root %}
        {% empty %}
            <p style="color: #94a3b8; text-align: center;">No sponsor trees found</p>
        {% endfor %}
    </div>
</div>

<style>
    .tree-node {
        display: inline-block;
        margin: 10px;
        padding: 15px;
        background-color: rgba(59, 130, 246, 0.1);
        border: 1px solid rgba(59, 130, 246, 0.3);
        border-radius: 8px;
        min-width: 180px;
    }

    .tree-node-username {
        font-weight: 700;
        color: var(--accent-color);
        margin-bottom: 8px;
    }

    .tree-node-info {
        font-size: 12px;
        color: #94a3b8;
        margin-bottom: 4px;
    }

    .tree-children {
        margin-top: 15px;
        padding-left: 20px;
        border-left: 2px solid var(--border-color);
    }
</style>
{% endblock %}
