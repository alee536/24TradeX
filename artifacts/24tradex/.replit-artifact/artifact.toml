kind = "web"
previewPath = "/"
title = "24TradeX"
version = "1.0.0"
id = "artifacts/24tradex"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18907

[services.development]
run = "pnpm --filter @workspace/24tradex run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/24tradex", "run", "build" ]
publicDir = "artifacts/24tradex/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18907"
BASE_PATH = "/"
